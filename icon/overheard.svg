<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="bubble" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8e8f0"/>
      <stop offset="100%" style="stop-color:#c8c8dc"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6c63ff"/>
      <stop offset="50%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#6c63ff"/>
    </linearGradient>
  </defs>

  <!-- macOS rounded square background -->
  <rect width="1024" height="1024" rx="230" ry="230" fill="url(#bg)"/>

  <!-- Subtle noise texture overlay -->
  <rect width="1024" height="1024" rx="230" ry="230" fill="white" opacity="0.03"/>

  <!-- Main speech bubble -->
  <path d="M 200 280
           Q 200 210 270 210
           L 754 210
           Q 824 210 824 280
           L 824 580
           Q 824 650 754 650
           L 520 650
           L 440 790
           L 400 650
           L 270 650
           Q 200 650 200 580
           Z"
        fill="url(#bubble)" opacity="0.96"/>

  <!-- Waveform bars inside bubble — centred vertically in bubble (y centre ~430) -->
  <!-- Bar heights vary to suggest natural speech cadence -->
  <rect x="280" y="370" width="36" height="120" rx="18" fill="url(#wave)"/>
  <rect x="334" y="340" width="36" height="180" rx="18" fill="url(#wave)"/>
  <rect x="388" y="395" width="36" height="70"  rx="18" fill="url(#wave)"/>
  <rect x="442" y="310" width="36" height="240" rx="18" fill="url(#wave)"/>
  <rect x="496" y="355" width="36" height="150" rx="18" fill="url(#wave)"/>
  <rect x="550" y="390" width="36" height="80"  rx="18" fill="url(#wave)"/>
  <rect x="604" y="330" width="36" height="200" rx="18" fill="url(#wave)"/>
  <rect x="658" y="368" width="36" height="124" rx="18" fill="url(#wave)"/>
  <rect x="712" y="400" width="36" height="60"  rx="18" fill="url(#wave)"/>

  <!-- Small secondary bubble top-right — suggests "overheard" / another voice -->
  <circle cx="810" cy="220" r="60" fill="#6c63ff" opacity="0.25"/>
  <circle cx="810" cy="220" r="42" fill="#a78bfa" opacity="0.35"/>
  <circle cx="797" cy="218" r="7" fill="white" opacity="0.8"/>
  <circle cx="810" cy="218" r="7" fill="white" opacity="0.8"/>
  <circle cx="823" cy="218" r="7" fill="white" opacity="0.8"/>
</svg>
